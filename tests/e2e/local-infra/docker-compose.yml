# =============================================================================
# Local infrastructure for sphere-sdk e2e tests.
#
# Two modes selected by the global-setup, both honored here:
#
#   1. RELAY-ONLY mode (E2E_LOCAL_INFRA=1) — the default. Only the
#      `relay` service boots. Faucet is spawned outside compose by
#      faucet.ts. Aggregator + IPFS continue to point at the public
#      Unicity testnet. Use when:
#        - the testnet relay's write path is broken / silently dropping
#          publishes (the 2026-05-04 outage that motivated this harness);
#        - CI runs need relay reproducibility (no shared rate limits,
#          no nametag collisions across concurrent jobs);
#        - we are debugging the SDK's interaction with Nostr.
#
#   2. FULL-STACK mode (E2E_FULL_LOCAL_STACK=1) — relay + mongodb +
#      aggregator + ipfs. Use when the public testnet aggregator is
#      down (HTTP 401 / consensus outage / GHCR image pull failure) or
#      when we need full hermetic e2e for CI.
#
# Service activation matrix (Compose profiles):
#   relay                       — always (no profile)
#   mongodb                     — profile: full
#   aggregator (BFT_ENABLED=false standalone) — profile: full
#   ipfs                        — profile: full
#   bft-root                    — profile: full-bft (opt-in foundation,
#                                 see service comment for status)
#   bft-aggregator-genesis-gen  — profile: full-bft
#   upload-shard-conf           — profile: full-bft
#
# Usage from the global-setup:
#   # relay only:
#   docker compose -f tests/e2e/local-infra/docker-compose.yml up -d
#   # full stack (relay + mongo + standalone aggregator + ipfs):
#   docker compose -f tests/e2e/local-infra/docker-compose.yml --profile full up -d
#   # full stack + experimental BFT services (not yet end-to-end):
#   docker compose -f tests/e2e/local-infra/docker-compose.yml \
#     --profile full --profile full-bft up -d
#   docker compose -f tests/e2e/local-infra/docker-compose.yml --profile full down -v
#
# Versions are pinned. Update via the parent global-setup so any change
# here is paired with a documented test-suite re-validation.
# =============================================================================

services:
  # ---------------------------------------------------------------------------
  # Local Nostr relay — ghcr.io/unicitynetwork/unicity-tokens-relay
  #
  # The Unicity org publishes a built nostr-rs-relay image. We pin to a
  # specific SHA so unrelated relay updates don't silently change test
  # behaviour. Bump this when validating against a newer relay release.
  # ---------------------------------------------------------------------------
  relay:
    image: ghcr.io/unicitynetwork/unicity-tokens-relay:sha-1e1b544
    container_name: uxf-e2e-relay
    restart: unless-stopped
    ports:
      # Loopback only — never expose the test relay to the network.
      # 7777 is arbitrary but unlikely to collide with developer tooling.
      - "127.0.0.1:7777:8080"
    volumes:
      # Persist the SQLite event log between container restarts so we
      # can post-mortem a failing test by `docker exec sqlite3`-ing
      # into the volume. `down -v` wipes it; `down` (without -v)
      # keeps it for inspection.
      - relay-data:/usr/src/app/db
    healthcheck:
      # NIP-11 info doc on HTTP returns the relay metadata; if it
      # responds 200 we know the WebSocket listener is also up
      # (same handler).
      test: ["CMD-SHELL", "wget -q -O - --header='Accept: application/nostr+json' http://127.0.0.1:8080 || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 12
      start_period: 5s

  # ---------------------------------------------------------------------------
  # BFT root node — opt-in via the `full-bft` profile. Foundation work
  # for hermetic e2e against a single-validator BFT aggregator that
  # produces real UnicityCertificates. **NOT YET FUNCTIONAL** — the
  # services boot cleanly and bft-root advances rounds, but the
  # aggregator's BFT client does not yet receive certificates back
  # (block finalization never happens, every inclusion proof comes
  # back as a non-inclusion witness with `authenticator: null`).
  #
  # Tracked as a follow-up in the PR description. Until that's solved,
  # the default `full` profile runs the aggregator in BFT_ENABLED=false
  # standalone mode and tests use `SPHERE_ORACLE_SKIP_VERIFICATION=1`
  # to bypass trust-base verification.
  #
  # To experiment with the BFT services:
  #   docker compose --profile full --profile full-bft up -d
  #
  # The init step (entrypoint script) is the upstream aggregator-go
  # docker-compose.yml's recipe verbatim:
  #   - root-node init       — generates ed25519 root keypair
  #   - trust-base generate  — single-validator trust base
  #   - trust-base sign      — root signs the trust base
  # Genesis files land in /genesis (bind-mounted to .bft-data/genesis/
  # on the host, gitignored). USER_UID/USER_GID env vars (set by
  # aggregator.ts at compose-up time) keep bind-mounted files owned
  # by the host user so the host process can read them without sudo.
  # ---------------------------------------------------------------------------
  bft-root:
    image: ghcr.io/unicitynetwork/bft-core:e1316ad51f4ecab1bc5406badec4c285fbdf14c7
    container_name: uxf-e2e-bft-root
    platform: linux/amd64
    user: "${USER_UID:-1000}:${USER_GID:-1000}"
    restart: unless-stopped
    profiles: [full-bft]
    volumes:
      - ./.bft-data/genesis-root:/genesis/root
      - ./.bft-data/genesis:/genesis
    healthcheck:
      test: ["CMD", "nc", "-zv", "bft-root", "8000"]
      interval: 5s
      timeout: 3s
      retries: 12
      start_period: 5s
    entrypoint: ["/busybox/sh", "-c"]
    command:
      - |
        if [ -f /genesis/root/node-info.json ] && [ -f /genesis/trust-base.json ] && [ -f /genesis/root/trust-base-signed.json ]; then
          echo "Genesis files already exist, skipping initialization."
        else
          echo "Creating root genesis..." &&
          ubft root-node init --home /genesis/root -g &&
          echo "Creating root trust base..." &&
          ubft trust-base generate --home /genesis --network-id 3 --node-info /genesis/root/node-info.json &&
          echo "Signing root trust base..." &&
          ubft trust-base sign --home /genesis/root --trust-base /genesis/trust-base.json
        fi
        echo "Starting root node..." &&
        exec ubft root-node run --home /genesis/root --address "/ip4/$(hostname -i)/tcp/8000" --trust-base /genesis/trust-base.json --rpc-server-address "$(hostname -i):8002"

  # ---------------------------------------------------------------------------
  # BFT aggregator genesis generator — init container; creates the
  # shard config + aggregator keypair + initial state, then exits.
  # The aggregator service depends on this completing successfully.
  # ---------------------------------------------------------------------------
  bft-aggregator-genesis-gen:
    image: ghcr.io/unicitynetwork/bft-core:e1316ad51f4ecab1bc5406badec4c285fbdf14c7
    container_name: uxf-e2e-bft-aggregator-genesis-gen
    platform: linux/amd64
    user: "${USER_UID:-1000}:${USER_GID:-1000}"
    profiles: [full-bft]
    depends_on:
      bft-root:
        condition: service_healthy
    volumes:
      - ./.bft-data/genesis-root:/genesis/root
      - ./.bft-data/genesis:/genesis
    entrypoint: ["/busybox/sh", "-c"]
    command:
      - |
        if [ -f /genesis/aggregator/node-info.json ] && [ -f /genesis/shard-conf-7_0.json ]; then
          echo "Aggregator genesis and config already exist, skipping initialization."
        else
          echo "Creating aggregator genesis..." &&
          ubft shard-node init --home /genesis/aggregator --generate &&
          echo "Creating aggregator partition configuration..." &&
          ubft shard-conf generate --home /genesis --network-id 3 --partition-id 7 --partition-type-id 7 --epoch-start 10 --node-info=/genesis/aggregator/node-info.json &&
          echo "Creating aggregator partition state..." &&
          ubft shard-conf genesis --home "/genesis/aggregator" --shard-conf /genesis/shard-conf-7_0.json
        fi
        # The aggregator container runs as its own non-root user (uid 1001
        # baked into the Dockerfile), while the genesis files are owned
        # by USER_UID (host user, typically 1000). Make every file
        # world-readable so the aggregator can mount them read-only and
        # actually read them. Upstream's compose does the same.
        chmod -R 755 /genesis/aggregator
        chmod 644 /genesis/shard-conf-7_0.json
        chmod 644 /genesis/trust-base.json
        chmod -R 755 /genesis/root

        # NOTE: bft-root's /api/v1/configurations endpoint requires
        # HTTP PUT — busybox wget can't do PUT, so the upload happens
        # in the upload-shard-conf service below (curlimages/curl).
        # We just generate the files here and exit.
        echo "Final permissions:"
        ls -l /genesis/aggregator
        ls -l /genesis/

  # ---------------------------------------------------------------------------
  # Shard-config uploader — registers the partition with bft-root so it
  # starts producing UnicityCertificates for the aggregator's shard.
  # PUT /api/v1/configurations only — busybox wget can't issue PUT,
  # so this is a separate init container using curl.
  # ---------------------------------------------------------------------------
  upload-shard-conf:
    image: curlimages/curl:8.13.0
    container_name: uxf-e2e-upload-shard-conf
    user: "${USER_UID:-1000}:${USER_GID:-1000}"
    profiles: [full-bft]
    restart: on-failure
    depends_on:
      bft-root:
        condition: service_healthy
      bft-aggregator-genesis-gen:
        condition: service_completed_successfully
    volumes:
      - ./.bft-data/genesis:/genesis:ro
    command:
      - /bin/sh
      - -c
      - |
        echo "Uploading shard-conf-7_0.json to bft-root via PUT" &&
        curl -fsS -X PUT -H 'Content-Type: application/json' --data-binary @/genesis/shard-conf-7_0.json http://bft-root:8002/api/v1/configurations

  # ---------------------------------------------------------------------------
  # MongoDB — backing store for the local aggregator.
  #
  # The aggregator-go binary auto-creates the required collections
  # (commitments, aggregator_records, blocks, smt_nodes, block_records)
  # on first connection — no init scripts needed.
  #
  # 27018 picked instead of the default 27017 to avoid collisions with
  # any host-side mongo a developer might already have running.
  # ---------------------------------------------------------------------------
  mongodb:
    image: mongo:7.0
    container_name: uxf-e2e-mongo
    restart: unless-stopped
    profiles: [full]
    ports:
      - "127.0.0.1:27018:27017"
    volumes:
      - mongo-data:/data/db
    healthcheck:
      # `mongosh --eval` returns the ping response when the server is
      # accepting connections; before the daemon is fully up the command
      # exits non-zero so this gates `depends_on` cleanly.
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.runCommand({ping:1}).ok"]
      interval: 5s
      timeout: 3s
      retries: 24
      start_period: 5s

  # ---------------------------------------------------------------------------
  # Aggregator (L3) — built locally from a pinned aggregator-go checkout.
  #
  # The build context lives at .aggregator-go/ — fetched on demand by
  # setup-aggregator-src.sh. The Dockerfile in that checkout is a two-
  # stage Alpine build (~30s, ~15 MB image). First boot pulls golang
  # base images; subsequent boots reuse the local image cache.
  #
  # **BFT_ENABLED=false (standalone)** is the default — block production
  # is driven by an internal 1s timer that calls `roundManager.
  # StartNewRound()` + `FinalizeBlock()` via `bft.NewBFTClientStub`,
  # bypassing consensus entirely. Real SMT, real inclusion proofs, but
  # NO UnicityCertificate is attached to each block.
  #
  # Tests opt out of trust-base verification via
  # `SPHERE_ORACLE_SKIP_VERIFICATION=1` (threaded through createNode
  # Providers → PaymentsModule → NametagMinter). The trade-off is
  # known: tests against this stack do NOT exercise the trust-base
  # verification path. The follow-up to fix this is the `full-bft`
  # profile (bft-root + genesis-gen + upload-shard-conf) — those
  # services are checked in but the cert flow back to the aggregator
  # doesn't yet complete (see PR notes).
  # ---------------------------------------------------------------------------
  aggregator:
    build:
      context: ./.aggregator-go
      dockerfile: Dockerfile
    image: unicity-aggregator-dev:local
    container_name: uxf-e2e-aggregator
    restart: unless-stopped
    profiles: [full]
    depends_on:
      mongodb:
        condition: service_healthy
    environment:
      MONGODB_URI: mongodb://mongodb:27017
      MONGODB_DATABASE: aggregator
      BFT_ENABLED: "false"
      DISABLE_HIGH_AVAILABILITY: "true"
      PORT: "3000"
      HOST: "0.0.0.0"
      LOG_LEVEL: info
    ports:
      - "127.0.0.1:3001:3000"
    healthcheck:
      # The aggregator's /health returns {"status":"ok",...} in
      # standalone mode (vs "healthy" in BFT mode). The check passes
      # if HTTP is 200; status-text discrimination happens in
      # aggregator.ts so it can give a richer error.
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1:3000/health || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 24
      start_period: 10s

  # ---------------------------------------------------------------------------
  # IPFS gateway + API — vanilla Kubo single-node.
  #
  # Wallets publish their own CAR bundles via the API (5001) and read
  # back via the gateway (8080-mapped-to-8082). The repo state lives
  # in a named volume so a re-up reuses any pinned CIDs from a prior
  # session.
  #
  # We rely on Kubo's defaults aside from explicit announce/swarm
  # bindings (so the gateway listens on all interfaces inside the
  # container, while the published port stays loopback).
  # ---------------------------------------------------------------------------
  ipfs:
    image: ipfs/kubo:latest
    container_name: uxf-e2e-ipfs
    restart: unless-stopped
    profiles: [full]
    ports:
      # 5002 -> 5001 API; 8082 -> 8080 gateway. Avoiding 5001/8080 on
      # the host so a dev's existing IPFS daemon (if any) doesn't
      # collide.
      - "127.0.0.1:5002:5001"
      - "127.0.0.1:8082:8080"
    volumes:
      - ipfs-data:/data/ipfs
    healthcheck:
      # /api/v0/version is a stable, no-side-effect probe that requires
      # the API server to be fully initialized (the daemon's bootstrap
      # finishes before it starts the API listener).
      test: ["CMD-SHELL", "wget -q -O /dev/null --post-data='' http://127.0.0.1:5001/api/v0/version || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 24
      start_period: 10s

volumes:
  relay-data:
  mongo-data:
  ipfs-data:
